# Flow — Fuzzel Theme
# Mirrors the Neovim / Ghostty / Alacritty palette exactly.
# All colors are RGBA (8 hex digits).

[colors]
background        = 0f1219ff   
text              = abb2bfff   
match             = 61afefff   
selection         = 2c3a50ff   
selection-text    = d7dae0ff   
selection-match   = ebc275ff   
prompt            = 56b6c2ff   
placeholder       = 4f5666ff   
input             = d7dae0ff   
counter           = 4f5666ff   
border            = 2c3a50ff   

[border]
width  = 2
radius = 2
selection-radius = 0
