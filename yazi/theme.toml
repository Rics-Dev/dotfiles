# ============================================================
# Flow — Yazi Theme
# Derived from the Flow Helix theme
# ============================================================

[flavor]
dark  = ""
light = ""

[app]
overall = { bg = "#0F1219" }  # Uncomment if your terminal supports OSC 11

[mgr]
cwd             = { fg = "#5ab0f6", bold = true }

find_keyword    = { fg = "#e5c07b", bold = true, italic = false, reversed = false }
find_position   = { fg = "#c678dd", italic = true }

symlink_target  = { fg = "#56b6c2", italic = true }

marker_copied   = { fg = "#98c379", bg = "#3b5135" }
marker_cut      = { fg = "#e06c75", bg = "#572a32" }
marker_marked   = { fg = "#e5c07b", bg = "#4e3e30" }
marker_selected = { fg = "#61afef", bg = "#293b4d" }

count_copied    = { fg = "#98c379", bold = true }
count_cut       = { fg = "#e06c75", bold = true }
count_selected  = { fg = "#61afef", bold = true }

border_symbol   = "│"
border_style    = { fg = "#23283a" }

syntect_theme   = ""

[indicator]
parent  = { fg = "#697082", bg = "#090c11" }
current = { fg = "#d7dae0", bg = "#2c313a", bold = true }
preview = { fg = "#4d89be", bg = "#2c313a" }
padding = { open = "▐", close = "▌" }

[tabs]
active   = { fg = "#d7dae0", bg = "#2c313a", bold = true }
inactive = { fg = "#697082", bg = "#090c11" }

sep_inner = { open = "[", close = "]" }
sep_outer = { open = "", close = "" }

[mode]
normal_main = { fg = "#0F1219", bg = "#5ab0f6", bold = true }
normal_alt  = { fg = "#5ab0f6", bg = "#2c313a" }

select_main = { fg = "#0F1219", bg = "#c678dd", bold = true }
select_alt  = { fg = "#c678dd", bg = "#2c313a" }

unset_main  = { fg = "#0F1219", bg = "#e5c07b", bold = true }
unset_alt   = { fg = "#e5c07b", bg = "#2c313a" }

[status]
overall  = { fg = "#d7dae0", bg = "#090c11" }

sep_left  = { open = "", close = "" }
sep_right = { open = "", close = "" }

perm_type  = { fg = "#61afef" }
perm_read  = { fg = "#98c379" }
perm_write = { fg = "#e06c75" }
perm_exec  = { fg = "#e5c07b", bold = true }
perm_sep   = { fg = "#3e4452" }

progress_label  = { fg = "#d7dae0", bold = true }
progress_normal = { fg = "#61afef", bg = "#090c11" }
progress_error  = { fg = "#ff4757", bg = "#090c11" }

[which]
cols           = 3
mask           = { bg = "#090c11" }
cand           = { fg = "#5ab0f6" }
rest           = { fg = "#697082" }
desc           = { fg = "#d7dae0" }
separator      = " → "
separator_style = { fg = "#3e4452" }

[confirm]
border  = { fg = "#23283a" }
title   = { fg = "#5ab0f6", bold = true }
body    = { fg = "#d7dae0" }
list    = { fg = "#abb2bf" }

btn_yes    = { fg = "#0F1219", bg = "#98c379", bold = true }
btn_no     = { fg = "#0F1219", bg = "#e06c75", bold = true }
btn_labels = ["Yes", "No"]

[spot]
border   = { fg = "#23283a" }
title    = { fg = "#5ab0f6", bold = true }
tbl_col  = { fg = "#5ab0f6", bold = true }
tbl_cell = { fg = "#d7dae0", bg = "#2c313a" }

[notify]
title_info  = { fg = "#5ab0f6", bold = true }
title_warn  = { fg = "#e5c07b", bold = true }
title_error = { fg = "#ff4757", bold = true }

[pick]
border   = { fg = "#23283a" }
active   = { fg = "#d7dae0", bg = "#2c313a", bold = true }
inactive = { fg = "#697082" }

[input]
border   = { fg = "#23283a" }
title    = { fg = "#5ab0f6", bold = true }
value    = { fg = "#d7dae0" }
selected = { fg = "#0F1219", bg = "#5ab0f6" }

[cmp]
border   = { fg = "#23283a" }
active   = { fg = "#d7dae0", bg = "#2c313a", bold = true }
inactive = { fg = "#697082" }

icon_file    = ""
icon_folder  = ""
icon_command = ""

[tasks]
border  = { fg = "#23283a" }
title   = { fg = "#5ab0f6", bold = true }
hovered = { fg = "#d7dae0", bg = "#2c313a", bold = true }

[help]
on      = { fg = "#e5c07b", bold = true }
run     = { fg = "#98c379" }
desc    = { fg = "#abb2bf" }
hovered = { fg = "#d7dae0", bg = "#2c313a", bold = true }
footer  = { fg = "#697082", bg = "#090c11" }

icon_info  = ""
icon_warn  = ""
icon_error = ""

[filetype]
rules = [
  # Images
  { mime = "image/*", fg = "#e5c07b" },
  # Audio / Video
  { mime = "{audio,video}/*", fg = "#c678dd" },
  # Archives
  { mime = "application/{zip,tar,gz,bz2,xz,7z,rar,zst}*", fg = "#d19a66" },
  # Documents
  { mime = "application/pdf", fg = "#e06c75" },
  { mime = "application/{doc,docx,odt,rtf}*", fg = "#61afef" },
  # Text / Code
  { mime = "text/*", fg = "#98c379" },
  # Empty files
  { mime = "inode/empty", fg = "#56b6c2" },
  # Orphan symlinks
  { url = "*", is = "orphan", fg = "#ff4757" },
  # Executables
  { url = "*", is = "exec", fg = "#98c379", bold = true },
  # Directories
  { url = "*/", fg = "#61afef", bold = true },
]
